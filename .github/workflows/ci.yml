name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: ruff check
        run: ruff check --output-format=github .
      # NOTE: `ruff format --check` is intentionally not enforced yet — the
      # codebase predates a formatter (172 files would change). It is staged
      # as a dedicated formatting PR in docs/plans/03-ci-pipeline.md before
      # being made blocking here.

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest -q --cov=src --cov=core --cov=routes --cov-report=term-missing

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # Non-blocking while typing coverage is ramped up per the adoption roadmap
    # in docs/plans/03-ci-pipeline.md. Flip to required once src/ core is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install mypy
      - run: mypy src core
